name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # --ignore-scripts skips Plasmo's post-install hooks; the storage
      # and types tests don't need the extension to be built.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm test
